/* Dark Mode */
.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#334155;--shadow:0 2px 12px rgba(0,0,0,.3)}
.dark .header{background:linear-gradient(135deg,#064e3b 0%,#1e3a5f 50%,#92400e 100%);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.dark .search-box input{background:rgba(30,41,59,.9);color:#e2e8f0;border:2px solid #475569}
.dark .search-box input:focus{background:#1e293b;box-shadow:0 2px 16px rgba(52,112,255,.3);border-color:#3470ff}
.dark .search-box::before{filter:invert(1)}
.dark .search-box .count{background:#334155;color:#64748b}
.dark .toolbar button{background:#1e293b;color:#94a3b8;border-color:#334155}
.dark .toolbar button:hover{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff}
.dark .toolbar button.active{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff}
.dark select,.dark #tag-select{background:#1e293b;color:#94a3b8;border-color:#475569}
.dark select:focus,.dark #tag-select:focus{outline:none;border-color:var(--accent)}
.dark select option{background:#1e293b;color:#e2e8f0}
.dark .sub-head{background:#1e293b}
.dark .sub-head:hover{background:#263548}
.dark .sub-head .count{background:rgba(99,102,241,.1);color:#6ee7b7;border-color:rgba(99,102,241,.18)}
.dark .sub-head:hover .count{background:rgba(99,102,241,.16);border-color:rgba(99,102,241,.25)}
.dark .point{background:#1e293b;border-color:#475569}
.dark .point:hover{background:#263548;box-shadow:0 2px 8px rgba(0,0,0,.1);border-left-color:rgba(99,102,241,.15)}
.dark .detail-list{background:none;border:none}
.dark .detail-item{background:#1e293b;border-color:#334155}
.dark .point.has-detail .expand-hint{background:rgba(99,102,241,.1);color:#64748b;border-color:rgba(99,102,241,.15)}
.dark .point.has-detail:hover .expand-hint{background:rgba(99,102,241,.2);color:#6ee7b7;border-color:rgba(99,102,241,.3)}
.dark .point.open .expand-hint{background:#065f46;color:#6ee7b7;border-color:#065f46;box-shadow:0 2px 8px rgba(6,95,70,.3)}
.dark .detail-item:hover{background:#263548;border-color:rgba(99,102,241,.25);box-shadow:0 3px 14px rgba(99,102,241,.1)}
.dark .detail-item::before{background:linear-gradient(135deg,#065f46,#10b981);color:#6ee7b7}

.dark ::-webkit-scrollbar-thumb:hover{background:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,#0d9488 0%,#2563eb 50%,#e8833a 100%);color:#fff;padding:24px 20px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 8px 32px rgba(13,148,136,.25);transition:padding .3s ease}
.header h1{font-size:1.45em;margin-bottom:6px;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.12)}
.header p{font-size:.78em;opacity:.7;font-weight:300}
.search-box{margin:10px auto 0;max-width:420px;position:relative;transition:all .25s ease}
.search-box:focus-within{max-width:500px}
.search-box input{width:100%;padding:10px 16px 10px 38px;border:2px solid transparent;border-radius:24px;font-size:14px;outline:none;background:rgba(255,255,255,.94);box-shadow:0 2px 12px rgba(0,0,0,.08);transition:all .25s ease;min-height:38px}
.search-box input:focus{box-shadow:0 2px 16px rgba(52,112,255,.25);background:#fff;border-color:#3470ff}
.search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;z-index:1}
.search-box .count{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;color:#aaa;background:#f0f0f0;padding:3px 8px;border-radius:12px;transition:right .2s ease}
.search-box.has-value .count{right:70px}
.toolbar{max-width:960px;margin:12px auto;text-align:center;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center}
.toolbar button{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:11px;color:var(--text2);transition:all .18s;font-weight:500;letter-spacing:.3px;min-height:30px}
.toolbar button:hover{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(13,148,136,.25)}
.toolbar button.active{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(13,148,136,.25)}
#tag-select{font-size:12px;padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);min-height:30px;cursor:pointer;outline:none;max-width:140px;transition:all .2s}
#tag-select:focus{border-color:var(--accent)}
.container{max-width:960px;margin:0 auto;padding:0 16px 60px}
.module{background:var(--card);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.module:hover{box-shadow:0 8px 30px rgba(0,0,0,.08);transform:translateY(-2px)}
.module-head{padding:16px 24px;color:#fff;font-size:1.05em;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;position:relative;transition:filter .15s}
.module-head:hover{filter:brightness(1.1)}
.module-head .badge{font-size:.7em;padding:3px 12px;border-radius:12px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);font-weight:500;letter-spacing:.5px;white-space:nowrap}
.module-head:hover .badge{background:rgba(255,255,255,.28)}
.module-head .icon{font-size:1em;flex-shrink:0}
.module-head .num{font-size:.8em;opacity:.7}
.module-head .title{flex:1}
.module-head .arrow{margin-left:auto;transition:transform .25s ease;font-size:.8em;opacity:.8}
.module.open .arrow{transform:rotate(90deg)}
.module > .sub{display:none}
.module.open > .sub{display:block}
.sub{border-top:1px solid var(--border)}
.sub-head{padding:12px 22px 12px 28px;font-size:.9em;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;background:var(--bg);transition:background .15s}
.sub-head:hover{background:#f5f7fa}
.sub-head .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sub-head .sub-title{flex:1;min-width:0;line-height:1.4}
.sub-head .count{font-size:.7em;padding:3px 10px;border-radius:999px;font-weight:600;margin-left:4px;background:rgba(99,102,241,.07);color:var(--accent);border:1px solid rgba(99,102,241,.12);white-space:nowrap;letter-spacing:.3px;transition:all .15s ease;flex-shrink:0}
.sub-head:hover .count{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.2)}
.sub-head .arrow{margin-left:auto;transition:transform .25s ease;font-size:.65em;color:var(--text3)}
.sub.open .arrow{transform:rotate(90deg)}
.points{padding:4px 22px 14px;display:none;animation:fadeIn .2s ease}
.sub.open .points{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
.point{padding:11px 14px;margin:6px 0;background:var(--card);border-radius:10px;border-left:3px solid transparent;font-size:.87em;position:relative;transition:all .22s ease}
.point:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left-color:rgba(99,102,241,.15)}
.point-row{display:flex;gap:12px;align-items:center}
.point.has-detail .point-row{cursor:pointer}
.point.has-detail .desc{padding-right:8px}
.point.has-detail .expand-hint{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;gap:3px;padding:3px 10px;border-radius:14px;background:rgba(99,102,241,.08);color:var(--text3);transition:all .28s ease;cursor:pointer;border:1.5px solid rgba(99,102,241,.12);font-size:.7em;font-weight:600;align-self:center;white-space:nowrap}
.point.has-detail .expand-hint::after{content:'';display:inline-block;width:5px;height:5px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(-45deg);transition:inherit;margin-left:1px}
.point.has-detail:hover .expand-hint{background:rgba(99,102,241,.16);color:var(--accent);border-color:rgba(99,102,241,.25)}
.point.open .expand-hint::after{transform:rotate(45deg)}
.point.open{border-left-color:var(--accent);box-shadow:0 2px 12px rgba(52,112,255,.12)}
.point.open .expand-hint{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(13,148,136,.2)}
.point .tag{flex-shrink:0;font-weight:650;color:var(--text);line-height:1.7;min-width:fit-content;padding-right:6px;margin-right:2px;border-right:2px solid var(--border)}
.point .desc{color:var(--text2);flex:1;line-height:1.75;font-size:.93em;word-break:break-word;padding-top:1px;min-width:0}
.point.open .tag{border-right-color:var(--accent)}
.detail-wrap{display:none;animation:slideDown .25s ease;position:relative}
.point.open .detail-wrap{display:block}
.detail-list{margin-top:14px;padding:12px;background:none;border:none;position:relative}
.detail-item{padding:14px 18px 14px 48px;margin:10px 0;font-size:.95em;line-height:1.8;color:var(--text2);position:relative;transition:all .2s ease;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.detail-item:hover{color:var(--text);background:#f8fafc;border-color:rgba(99,102,241,.18);box-shadow:0 3px 14px rgba(99,102,241,.07)}
.detail-item::before{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65em;font-weight:700;counter-increment:detail-counter;content:counter(detail-counter)}
.detail-list{counter-reset:detail-counter}
/* Sub-detail within detail items */
.detail-item.has-sub{cursor:pointer;padding-right:36px;padding-top:10px;padding-bottom:10px;margin:8px 0 8px;font-weight:600;color:var(--text);border-left:3px solid transparent;border-radius:12px;transition:all .22s ease}
.detail-item.has-sub:hover{border-left-color:var(--accent);background:#f0f7ff;color:var(--text)}
.detail-item.has-sub.open{border-left-color:var(--accent);background:var(--bg)}
.detail-item .sub-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:rgba(99,102,241,.08);color:var(--text3);border:1.5px solid rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .28s ease;padding:0;flex-shrink:0}
.detail-item .sub-arrow::after{content:'';display:block;width:5px;height:5px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(-45deg);transition:inherit}
.detail-item.has-sub:hover .sub-arrow{background:rgba(99,102,241,.16);color:var(--accent);border-color:rgba(99,102,241,.25)}
.detail-item.has-sub.open .sub-arrow{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(13,148,136,.2);transform:translateY(-50%)}
.detail-item.has-sub.open .sub-arrow::after{transform:rotate(45deg)}
.detail-item .sub-detail{display:none;margin:12px 0 4px -10px;padding:12px 16px;background:var(--card);border-radius:10px;font-size:.84em;color:var(--text2);line-height:1.8;font-weight:400;border-left:3px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.detail-item.has-sub.open .sub-detail{display:block;animation:fadeIn .2s ease}
.dark .detail-item.has-sub{color:#e2e8f0;font-weight:600}
.dark .detail-item.has-sub:hover{border-left-color:#6ee7b7;background:#263548;color:#e2e8f0}
.dark .detail-item.has-sub.open{border-left-color:#6ee7b7;background:#1e293b}
.dark .detail-item.has-sub .sub-arrow{background:rgba(99,102,241,.15);color:#64748b;border-color:rgba(99,102,241,.2)}
.dark .detail-item.has-sub:hover .sub-arrow{background:rgba(99,102,241,.25);color:#6ee7b7;border-color:rgba(99,102,241,.3)}
.dark .detail-item.has-sub.open .sub-arrow{background:#065f46;color:#6ee7b7;border-color:#065f46;box-shadow:0 2px 8px rgba(6,95,70,.3)}
.dark .detail-item .sub-detail{background:#0f172a;border-left-color:#065f46;color:#e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
/* Detail Toggle — Progressive Disclosure */
.detail-toggle{display:flex;align-items:center;justify-content:center;padding:10px 0;margin:8px 0 2px;cursor:pointer;user-select:none;color:var(--accent);font-size:.82em;font-weight:500;gap:8px;transition:color .15s}
.detail-toggle:hover{color:var(--text)}
.detail-toggle::before,.detail-toggle::after{content:'';flex:1;border-top:1px dashed var(--border)}
.detail-toggle .toggle-icon{display:inline-flex;transition:transform .22s ease}
.detail-list.expanded .toggle-icon{transform:rotate(180deg)}
.detail-item.detail-hidden{display:none}
.detail-list.expanded .detail-item.detail-hidden{display:block;animation:fadeIn .2s ease}
.dark .detail-toggle{color:#6ee7b7}
.dark .detail-toggle:hover{color:#e2e8f0}
.dark .detail-toggle::before,.dark .detail-toggle::after{border-color:#475569}
.hl{background:#fef3c7;color:#b45309;border-radius:3px;padding:0 3px;font-weight:500}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#aaa}

/* Scroll Progress Bar */
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),#a78bfa,var(--accent2));z-index:200;transition:width .1s linear;border-radius:0 2px 2px 0}
/* Back to Top */
.back-top{position:fixed;bottom:32px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;font-size:1.2em;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(13,148,136,.3);opacity:0;transform:translateY(20px);transition:all .3s ease;z-index:99;border:none}
.back-top.show{opacity:1;transform:translateY(0)}
.back-top:hover{background:#0f766e;transform:translateY(-3px);box-shadow:0 8px 24px rgba(13,148,136,.4)}
.dark .back-top{background:#065f46}
/* Quick Nav Panel */
.quick-nav{position:fixed;top:50%;right:8px;transform:translateY(-50%);z-index:99;display:flex;flex-direction:column;gap:5px;opacity:.7;transition:opacity .2s}
.quick-nav:hover{opacity:1}
.quick-nav a{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .25s;display:block;position:relative;cursor:pointer}
.quick-nav a.active{transform:scale(1.6);box-shadow:0 0 6px rgba(0,0,0,.2)}
